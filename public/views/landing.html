<!doctype html>
<html lang="en" class="no-js">
    <head>
        <!-- Title and Icon -->

        <title id="landingTitle">SGC Meet — Secure Video Meetings.</title>
        <link id="shortcutIcon" rel="shortcut icon" type="image/jpeg" href="../images/sgc-favicon.jpg" />
        <link id="appleTouchIcon" rel="apple-touch-icon" href="../images/sgc-logo.jpg" />

        <!-- Meta Information -->

        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <meta
            name="description"
            content="SGC Meet — secure, real-time WebRTC video meetings, chat and screen sharing in your browser. Pick a room name and start."
        />

        <!-- https://ogp.me -->

        <meta property="og:type" content="{{OG_TYPE}}" />
        <meta property="og:site_name" content="{{OG_SITE_NAME}}" />
        <meta property="og:title" content="{{OG_TITLE}}" />
        <meta property="og:description" content="{{OG_DESCRIPTION}}" />
        <meta property="og:image" content="{{OG_IMAGE}}" />
        <meta property="og:url" content="{{OG_URL}}" />

        <!-- xss -->

        <script src="https://cdn.jsdelivr.net/npm/xss/dist/xss.min.js"></script>

        <!-- https://cdnjs.com/libraries/font-awesome -->

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" />

        <!-- StyleSheet -->

        <link rel="stylesheet" href="../css/landing.css" />
        <link rel="stylesheet" href="../css/newcall.css" />

        <!-- https://animate.style 4 using for swal fadeIn-Out -->

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

        <!-- SGC brand palette (loaded last so it overrides) -->

        <link rel="stylesheet" href="../css/brand.css" />

        <!-- sweetalert -->

        <script defer src="https://cdn.jsdelivr.net/npm/sweetalert2@11.4.8"></script>
    </head>
    <body class="has-animations">
        <div class="body-wrap">
            <header class="site-header reveal-from-top">
                <div class="container">
                    <div class="site-header-inner">
                        <div class="brand">
                            <div class="m-0">
                                <a href="/">
                                    <img
                                        class="brand-logo"
                                        src="../images/sgc-logo.jpg"
                                        alt="SGC Meet"
                                        width="48"
                                        height="48"
                                    />
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </header>
            <main class="site-content">
                <section class="cta section center-content-mobile reveal-from-bottom mb-32">
                    <div class="container">
                        <div class="cta-inner section-inner cta-split br-12">
                            <div class="cta-slogan">
                                <h3 id="appJoinDescription" class="m-0">Pick a room name.</h3>
                            </div>
                            <div class="cta-action">
                                <div class="mb-0">
                                    <label class="form-label screen-reader" for="roomName">SGC Meet</label>
                                    <div class="form-group-desktop">
                                        <div class="room-input-wrap">
                                            <input
                                                id="roomName"
                                                class="form-input"
                                                type="text"
                                                value="mirotalk"
                                                maxlength="32"
                                            />
                                            <button
                                                id="genRoomButton"
                                                class="room-gen-btn fas fa-arrows-rotate"
                                            ></button>
                                        </div>
                                        <button id="joinRoomButton" class="button button-primary br-6">
                                            Join Room
                                        </button>
                                    </div>
                                    <div class="mt-16">
                                        <button
                                            id="customizeRoomButton"
                                            class="button button-custom-room button-block br-6"
                                        >
                                            Customize Room
                                        </button>
                                    </div>
                                </div>
                                <div id="lastRoomContainer" class="last-room">
                                    <span id="appJoinLastRoom">Your recent room:</span>
                                    <a id="lastRoom"></a>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </main>
        </div>
        <script defer src="../js/utils.js"></script>
        <script defer src="../js/common.js"></script>
        <script defer src="../js/brand.js"></script>
        <script defer src="../js/landing.js"></script>
    </body>
</html>
