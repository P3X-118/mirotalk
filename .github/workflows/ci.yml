name: CI

on:
  push:
    branches:
      - master
      - sgc-dev
      - sgc
  pull_request:
    branches:
      - master
      - sgc-dev
      - sgc

jobs:
  test:
    runs-on: ubuntu-22.04 # LTS
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'  # LTS

      - name: Install dependencies
        run: npm install

      - name: Create config from template
        run: cp app/src/config.template.js app/src/config.js

      - name: Run unit tests
        run: npm test

# Note: the SGC fork does NOT auto-publish images from CI.
# Production releases on the `sgc` branch are tagged manually and pushed to
# `legitservices/mirotalk:<tag>` from a developer workstation, after passing
# the security review on `sgc-dev`. Re-introducing a build/push job requires
# DOCKERHUB_USERNAME / DOCKERHUB_ACCESS_TOKEN secrets scoped to the
# legitservices account, and should target only the `sgc` branch.
